version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: budget_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-budget_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budget_pass}
      POSTGRES_DB: ${DB_NAME:-budget_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budget_user} -d ${DB_NAME:-budget_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
